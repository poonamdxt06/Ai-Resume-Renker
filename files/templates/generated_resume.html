<!DOCTYPE html>
<html>
<head>
    <title>AI Generated Resume</title>
    <style>
        body {
            font-family: Arial;
            padding: 30px;
            background: #f5f5f5;
        }
        .resume-box {
            background: white;
            padding: 25px;
            border-radius: 10px;
            white-space: pre-wrap;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
        }
        .btn {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            background: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }
    </style>
</head>
<body>

    <h1>🚀 AI Generated Resume</h1>

    <div class="resume-box">
        {{ resume }}
    </div>

    <a href="/" class="btn">⬅ Back to Home</a>

</body>
</html>
